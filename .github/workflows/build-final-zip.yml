name: Build Final Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Next.js Site
        run: npm run build
        working-directory: ./frontend

      - name: Download All Images from Old FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p frontend/out/images
          cd frontend/out/images
          wget -r -nH --cut-dirs=1 --user="$FTP_USER" --password="$FTP_PASS" "ftp://$FTP_HOST/images/" || true

      - name: Create Zip Archive
        run: |
          cd frontend/out
          zip -r ../../crfisite_final.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crfisite_final
          path: crfisite_final.zip
