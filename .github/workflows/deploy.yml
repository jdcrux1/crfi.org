name: Deploy CRFI Site to cPanel via FTP

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build static site
        run: npm run build
        working-directory: ./frontend

      - name: Deploy via FTP
        uses: samkirkland/ftp-deploy-action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/out/
          server-dir: crfing.org/www/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            images/**
            media/**

      - name: Remove legacy index.php if present
        if: always()
        run: |
          curl -s -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_HOST }}/crfing.org/www/index.php" -X DELETE || true
        shell: bash
