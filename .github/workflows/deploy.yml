name: Deploy CRFI Site to cPanel via FTP

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build static site
        run: npm run build
        working-directory: ./frontend

      - name: Deploy Test Files via curl
        run: |
          echo "Test Root" > test-root-777.txt
          echo "Test Public HTML" > test-public-777.txt
          echo "Test Crfing Org" > test-crfing-777.txt
          echo "Test Crfing Www" > test-www-777.txt
          
          curl -s -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -T test-root-777.txt "ftp://${{ secrets.FTP_HOST }}/test-root-777.txt" || true
          curl -s -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -T test-public-777.txt "ftp://${{ secrets.FTP_HOST }}/public_html/test-public-777.txt" || true
          curl -s -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -T test-crfing-777.txt "ftp://${{ secrets.FTP_HOST }}/crfing.org/test-crfing-777.txt" || true
          curl -s -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" -T test-www-777.txt "ftp://${{ secrets.FTP_HOST }}/crfing.org/www/test-www-777.txt" || true
        shell: bash
