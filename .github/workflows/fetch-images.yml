name: Fetch Images from FTP

on:
  push:
    paths:
      - '.github/workflows/fetch-images.yml'

jobs:
  fetch-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Scan FTP directory tree
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          python ftp_scanner.py

      - name: Commit and push scan result
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ftp_scan_result.json
          git commit -m "Add FTP scan result" || echo "No changes"
          git push
